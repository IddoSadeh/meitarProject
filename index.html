<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>m.v Sensor</title>
    <meta
      name="description"
      content="m.v sensor product page hero section."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-menu" aria-label="Primary">
      <div class="site-menu__status" aria-label="Local interface status">
        <span class="site-menu__dot" aria-hidden="true"></span>
        <span id="locale-time">US_00:00:00</span>
      </div>

      <div class="site-menu__actions">
        <nav class="site-menu__nav" aria-label="Site">
          <a href="#m2">M2</a>
          <a href="#m2-os">M2_os</a>
          <a href="#company">company</a>
          <a href="#login">Login</a>
          <button type="button">MENU</button>
        </nav>

        <button class="site-menu__icon" type="button" aria-label="Open menu">
          <span class="site-menu__mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <img
          class="hero__image"
          src="assets/hero-product-page.png"
          alt="Two people facing each other, each wearing a small body sensor."
        />

        <div class="hero__content">
          <h1 id="hero-title" class="hero__title">
            <span>Capture what</span>
            <span>your body registers</span>
          </h1>

          <div class="hero__footer">
            <div class="hero__rule" aria-hidden="true"></div>

            <div class="hero__bottom">
              <ul class="hero__features" aria-label="Included with purchase">
                <li>/ m.v sensor</li>
                <li>/ / months of m.v_os access</li>
                <li>/ / / Charging Dock</li>
              </ul>

              <a class="button" href="#order">Order now</a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
